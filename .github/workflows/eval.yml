name: Eval Gate (Live PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-live-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: semiconductor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d semiconductor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: semiconductor
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate OpenAI secret
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required for live PR evals."
            exit 1
          fi
        shell: bash

      - name: Seed Postgres
        run: |
          python scripts/seed_semiconductor_db.py
        shell: bash

      - name: Run full suite (live)
        id: run-demos
        run: |
          set -o pipefail
          python run_all.py --live | tee run.log
        shell: bash
        continue-on-error: true

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-live-eval-log
          path: run.log

      - name: Fail if gates failed
        if: steps.run-demos.outcome == 'failure'
        run: |
          echo 'Live PR gate failed.'
          exit 1
        shell: bash

      - name: Comment summary on PR
        if: always()
        uses: actions/github-script@v7
        env:
          GATE_STATUS: ${{ steps.run-demos.outcome }}
        with:
          script: |
            const fs = require('fs');
            let tail = 'log missing';
            try {
              const log = fs.readFileSync('run.log', 'utf8');
              const lines = log.trim().split(/\r?\n/);
              tail = lines.slice(-30).join('\n');
            } catch (err) {
              tail = 'log unavailable';
            }
            const status = process.env.GATE_STATUS === 'success' ? '✅ PASS' : '❌ FAIL';
            const body = `### Live PR Eval Summary\n**Result:** ${status}\n<details><summary>Last 30 lines</summary>\n\n\
\
\
${tail}\n\
\
\
\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
