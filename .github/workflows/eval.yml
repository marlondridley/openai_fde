name: Eval Gate (Mock)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  mock-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run demo suite (mock)
        id: run-demos
        run: |
          set -o pipefail
          python demo/run_all.py --mock | tee run.log
        shell: bash
        continue-on-error: true

      - name: Upload demo log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-demo-log
          path: run.log

      - name: Fail if gates failed
        if: steps.run-demos.outcome == 'failure'
        run: |
          echo 'Regression gates failed. See summary comment for details.'
          exit 1
        shell: bash

      - name: Comment summary on PR
        if: always()
        uses: actions/github-script@v7
        env:
          GATE_STATUS: ${{ steps.run-demos.outcome }}
        with:
          script: |
            const fs = require('fs');
            let tail = 'log missing';
            try {
              const log = fs.readFileSync('run.log', 'utf8');
              const lines = log.trim().split(/\r?\n/);
              tail = lines.slice(-25).join('\n');
            } catch (err) {
              tail = 'log unavailable';
            }
            const status = process.env.GATE_STATUS === 'success' ? '✅ PASS' : '❌ FAIL';
            const body = `### Mock Eval Summary\n**Result:** ${status}\n<details><summary>Last 25 lines</summary>\n\n\`\`\`\n${tail}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
